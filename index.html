<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NOXCHI VPN</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #1C1C1E;
            --text-main: #FFFFFF;
            --text-secondary: #8E8E93;
            --accent-gray: #2C2C2E;
            --icon-color: #AEAEB2;
            --status-green: #30D158;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }
        .header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .bot-name { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
        .status-badge {
            background-color: var(--card-bg);
            color: var(--text-secondary);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .status-dot { width: 8px; height: 8px; background-color: var(--status-green); border-radius: 50%; box-shadow: 0 0 10px var(--status-green); }
        
        .main-card {
            background-color: var(--card-bg);
            width: 100%;
            border-radius: 28px;
            padding: 24px;
            box-sizing: border-box;
            margin-bottom: 16px;
            text-align: left;
        }
        .info-label { color: var(--text-secondary); font-size: 13px; margin-bottom: 6px; }
        .info-value { font-size: 32px; font-weight: 700; margin-bottom: 24px; color: var(--text-main); }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .stat-item {
            background-color: var(--accent-gray);
            border-radius: 18px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .stat-item i { color: var(--icon-color); font-size: 18px; }
        .stat-text { font-weight: 600; font-size: 15px; }
        .stat-desc { color: var(--text-secondary); font-size: 11px; }

        .action-list { width: 100%; display: flex; flex-direction: column; gap: 10px; }
        .menu-btn {
            width: 100%;
            background-color: var(--card-bg);
            border: none;
            border-radius: 20px;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: var(--text-main);
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .menu-btn:active { opacity: 0.7; }
        .btn-content { display: flex; align-items: center; gap: 16px; }
        .btn-content i { color: var(--icon-color); font-size: 20px; width: 24px; text-align: center; }
        .btn-title { font-weight: 600; font-size: 16px; }
        .chevron { color: var(--accent-gray); font-size: 14px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="bot-name">NOXCHI VPN</div>
        <div class="status-badge"><div class="status-dot"></div>Подключено</div>
    </div>

    <div class="main-card">
        <div class="info-label">Состояние доступа</div>
        <div class="info-value">Активен</div>
        
        <div class="stats-grid">
            <div class="stat-item">
                <i class="fa-solid fa-shield-halved"></i>
                <div>
                    <div class="stat-text">Защищено</div>
                    <div class="stat-desc">Шифрование Reality</div>
                </div>
            </div>
            <div class="stat-item">
                <i class="fa-solid fa-gauge-high"></i>
                <div>
                    <div class="stat-text">Безлимит</div>
                    <div class="stat-desc">Скорость до 1 Гбит/с</div>
                </div>
            </div>
        </div>
    </div>

    <div class="action-list">
        <button class="menu-btn" onclick="Telegram.WebApp.close()">
            <div class="btn-content">
                <i class="fa-solid fa-circle-check"></i>
                <div class="btn-title">Начать работу</div>
            </div>
            <i class="fa-solid fa-chevron-right chevron"></i>
        </button>

        <button class="menu-btn" onclick="Telegram.WebApp.close()">
            <div class="btn-content">
                <i class="fa-solid fa-book"></i>
                <div class="btn-title">Инструкция</div>
            </div>
            <i class="fa-solid fa-chevron-right chevron"></i>
        </button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.headerColor = '#000000';
    </script>
</body>
</html>
